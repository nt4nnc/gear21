<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Offline Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; }
        #canvas { border: 2px solid #222; background: #fff; cursor: crosshair; touch-action: none; width: 100%; height: 350px; border-radius: 8px; }
        .chat-box { height: 250px; overflow-y: auto; background: white; border: 1px solid #ced4da; padding: 10px; border-radius: 6px; }
        .forum-box { max-height: 400px; overflow-y: auto; }
        .post-card { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #ced4da; }
    </style>
</head>
<body>

<div class="container my-4">
    <h1 class="text-center mb-4">gear21</h1>
    <div class="alert alert-success text-center">saves in browser cache! [allegedly]</div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card mb-4 shadow-sm">
                <div class="card-header bg-primary text-white fw-bold">le chat</div>
                <div class="card-body">
                    <div class="chat-box mb-3" id="chat-box"></div>
                    <div class="input-group">
                        <input type="text" id="chat-input" class="form-control" placeholder="Type a message...">
                        <button class="btn btn-primary" id="chat-send">Send</button>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white fw-bold">📝 open</div>
                <div class="card-body">
                    <div class="mb-3 p-3 bg-light border rounded">
                        <input type="text" id="post-title" class="form-control mb-2" placeholder="Topic Title">
                        <textarea id="post-content" class="form-control mb-2" rows="2" placeholder="Write something..."></textarea>
                        <button class="btn btn-dark btn-sm w-100" id="post-submit">post</button>
                    </div>
                    <div class="forum-box" id="forum-feed"></div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white fw-bold d-flex justify-content-between align-items-center">
                    <span>draw shi yeahh</span>
                    <button class="btn btn-sm btn-light" id="clear-canvas">Clear</button>
                </div>
                <div class="card-body text-center">
                    <canvas id="canvas"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const username = "You_User";

    // --- CHAT SYSTEM ---
    const chatBox = document.getElementById("chat-box");
    const chatInput = document.getElementById("chat-input");
    const chatSend = document.getElementById("chat-send");
    
    let chats = JSON.parse(localStorage.getItem("local_chats")) || [];

    function renderChats() {
        chatBox.innerHTML = "";
        chats.forEach(msg => {
            const div = document.createElement("div");
            div.innerHTML = `<strong>${msg.user}:</strong> ${msg.text}`;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatSend.onclick = () => {
        if (!chatInput.value.trim()) return;
        chats.push({ user: username, text: chatInput.value });
        localStorage.setItem("local_chats", JSON.stringify(chats));
        chatInput.value = "";
        renderChats();
    };

    // --- FORUM SYSTEM ---
    const postTitle = document.getElementById("post-title");
    const postContent = document.getElementById("post-content");
    const postSubmit = document.getElementById("post-submit");
    const forumFeed = document.getElementById("forum-feed");

    let posts = JSON.parse(localStorage.getItem("local_posts")) || [];

    function renderForum() {
        forumFeed.innerHTML = "";
        posts.forEach((post, index) => {
            const card = document.createElement("div");
            card.className = "post-card shadow-sm";
            card.innerHTML = `
                <h5 class="text-primary mb-1">${post.title}</h5>
                <small class="text-muted">By ${post.author}</small>
                <p class="my-2">${post.content}</p>
                <button class="btn btn-outline-danger btn-sm" onclick="likePost(${index})">❤️ Like (${post.likes})</button>
            `;
            forumFeed.appendChild(card);
        });
    }

    postSubmit.onclick = () => {
        if (!postTitle.value.trim() || !postContent.value.trim()) return;
        posts.unshift({
            title: postTitle.value,
            content: postContent.value,
            author: username,
            likes: 0
        });
        localStorage.setItem("local_posts", JSON.stringify(posts));
        postTitle.value = "";
        postContent.value = "";
        renderForum();
    };

    window.likePost = (index) => {
        posts[index].likes++;
        localStorage.setItem("local_posts", JSON.stringify(posts));
        renderForum();
    };

    // --- CANVAS DRAWING BOARD ---
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    // Fix positioning resolution
    canvas.width = canvas.offsetWidth || 500;
    canvas.height = canvas.offsetHeight || 350;

    let drawing = false;

    // Load canvas picture from local memory if it exists
    const savedCanvas = localStorage.getItem("local_canvas_img");
    if (savedCanvas) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = savedCanvas;
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function startDrawing(e) {
        drawing = true;
        const pos = getMousePos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        const pos = getMousePos(e);
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.strokeStyle = "#dc3545";
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
    }

    function stopDrawing() {
        if (!drawing) return;
        drawing = false;
        ctx.beginPath();
        // Save sketch work to local cache strings
        localStorage.setItem("local_canvas_img", canvas.toDataURL());
    }

    canvas.addEventListener("mousedown", startDrawing);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseleave", stopDrawing);

    canvas.addEventListener("touchstart", startDrawing);
    canvas.addEventListener("touchmove", draw);
    canvas.addEventListener("touchend", stopDrawing);

    document.getElementById("clear-canvas").onclick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        localStorage.removeItem("local_canvas_img");
    };

    // Launch existing saves on browser screen startup
    renderChats();
    renderForum();
</script>

</body>
</html>
