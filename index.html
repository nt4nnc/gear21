<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gear 21</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; font-family: system-ui, sans-serif; }
        .feature-card { height: 500px; border-radius: 12px; background: white; border: 1px solid #dee2e6; display: flex; flex-direction: column; }
        .chat-box { flex-grow: 1; overflow-y: auto; background: #fff; padding: 10px; }
        #canvas { border: 1px solid #dee2e6; background: #fff; cursor: crosshair; touch-action: none; width: 100%; height: 100%; flex-grow: 1; border-radius: 0 0 12px 12px; }
        .forum-box { height: 320px; overflow-y: auto; }
        .post-card { background: #fff; border: 1px solid #e3e6f0; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    </style>
</head>
<body>

<div class="container-fluid py-4 px-4">
    <h1 class="text-center fw-bold text-dark mb-2">beta</h1>
    <p class="text-center text-success fw-bold mb-4">v3</p>

    <div class="row g-4">
        
        <div class="col-lg-4 col-md-6">
            <div class="card feature-card shadow-sm">
                <div class="card-header bg-primary text-white fw-bold">💬 Public Live Chat</div>
                <div class="chat-box" id="chat-box"></div>
                <div class="p-2 border-top bg-light">
                    <div class="input-group">
                        <input type="text" id="chat-input" class="form-control form-control-sm" placeholder="Type a message...">
                        <button class="btn btn-primary" id="chat-send">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4 col-md-6">
            <div class="card feature-card shadow-sm">
                <div class="card-header bg-danger text-white fw-bold d-flex justify-content-between align-items-center">
                    <span>🎨 Shared Public Canvas</span>
                    <button class="btn btn-xs btn-light py-0 px-2 text-danger fs-6" id="clear-canvas">Clear</button>
                </div>
                <canvas id="canvas"></canvas>
            </div>
        </div>

        <div class="col-lg-4 col-md-12">
            <div class="card feature-card shadow-sm p-3" style="height: auto; min-height: 500px;">
                <div class="fw-bold mb-2">📝 Public Forum</div>
                <div class="mb-3 p-2 bg-light border rounded">
                    <input type="text" id="post-title" class="form-control form-control-sm mb-1" placeholder="Post Title">
                    <textarea id="post-content" class="form-control form-control-sm mb-1" rows="2" placeholder="Write something..."></textarea>
                    <button class="btn btn-dark btn-sm w-100" id="post-submit">Publish Post</button>
                </div>
                <div class="forum-box" id="forum-feed"></div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>

<script>
    const username = "User_" + Math.floor(Math.random() * 9000 + 1000);
    const chatBox = document.getElementById("chat-box");
    const chatInput = document.getElementById("chat-input");
    const chatSend = document.getElementById("chat-send");
    
    // Connects users under a shared room ID name
    const peer = new Peer('github-hub-room-2026-' + Math.floor(Math.random() * 1000));
    let connections = [];

    // Automatically seek out and link to other users currently viewing the page
    function broadcast(data) {
        connections.forEach(conn => {
            if (conn.open) conn.send(data);
        });
    }

    // Handle receiving messages (Chat and Drawing)
    function handleData(data) {
        if (data.type === 'chat') {
            const div = document.createElement("div");
            div.className = "mb-1";
            div.innerHTML = `<strong class="text-secondary">${data.user}:</strong> <span>${data.text}</span>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        } else if (data.type === 'draw') {
            drawLine(data.x1, data.y1, data.x2, data.y2, false);
        } else if (data.type === 'clear') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    peer.on('connection', (conn) => {
        connections.push(conn);
        conn.on('data', handleData);
    });

    // Send chat text out to everyone
    chatSend.onclick = () => {
        if (!chatInput.value.trim()) return;
        const msgData = { type: 'chat', user: username, text: chatInput.value };
        
        // Render locally
        handleData(msgData);
        // Send to everyone else
        broadcast(msgData);
        
        chatInput.value = "";
    };

    chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") chatSend.click(); });

    // --- CANVAS SYSTEM ---
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 500);

    let drawing = false;
    let lastX = 0, lastY = 0;

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function drawLine(x1, y1, x2, y2, emit=false) {
        ctx.beginPath();
        ctx.strokeStyle = "#dc3545";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.closePath();

        if (emit) {
            broadcast({ type: 'draw', x1, y1, x2, y2 });
        }
    }

    canvas.addEventListener('mousedown', (e) => { drawing = true; const pos = getMousePos(e); lastX = pos.x; lastY = pos.y; });
    canvas.addEventListener('mousemove', (e) => { if (!drawing) return; const pos = getMousePos(e); drawLine(lastX, lastY, pos.x, pos.y, true); lastX = pos.x; lastY = pos.y; });
    canvas.addEventListener('mouseup', () => drawing = false);

    document.getElementById("clear-canvas").onclick = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        broadcast({ type: 'clear' });
    };

    // --- LOCAL FORUM STORAGE ---
    const postTitle = document.getElementById("post-title");
    const postContent = document.getElementById("post-content");
    const postSubmit = document.getElementById("post-submit");
    const forumFeed = document.getElementById("forum-feed");

    let posts = JSON.parse(localStorage.getItem("hub_posts")) || [
        { title: "Welcome!", content: "Type a topic above to pin it permanently here.", likes: 2 }
    ];

    function renderForum() {
        forumFeed.innerHTML = "";
        posts.forEach((post, index) => {
            const card = document.createElement("div");
            card.className = "post-card shadow-sm";
            card.innerHTML = `
                <h6 class="text-primary fw-bold mb-1">${post.title}</h6>
                <p class="small text-secondary mb-2">${post.content}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <button class="btn btn-sm btn-outline-danger py-0 px-2 small" onclick="likePost(${index})">❤️ Like (${post.likes})</button>
                    <button class="btn btn-sm btn-link text-muted py-0 text-decoration-none small" onclick="deletePost(${index})">🗑️ Delete</button>
                </div>
            `;
            forumFeed.appendChild(card);
        });
    }

    postSubmit.onclick = () => {
        if (!postTitle.value.trim() || !postContent.value.trim()) return;
        posts.unshift({ title: postTitle.value, content: postContent.value, likes: 0 });
        localStorage.setItem("hub_posts", JSON.stringify(posts));
        postTitle.value = ""; postContent.value = "";
        renderForum();
    };

    window.likePost = (index) => { posts[index].likes++; localStorage.setItem("hub_posts", JSON.stringify(posts)); renderForum(); };
    window.deletePost = (index) => { posts.splice(index, 1); localStorage.setItem("hub_posts", JSON.stringify(posts)); renderForum(); };
    renderForum();
</script>

</body>
</html>
